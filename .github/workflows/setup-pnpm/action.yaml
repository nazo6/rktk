name: Setup pnpm

description: "Setup node,pnpm and install deps"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v6
      name: Install pnpm

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - name: pnpm install
      shell: bash
      run: pnpm install -r
